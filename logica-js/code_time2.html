<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora de codar 02</title>

    <script>
        function compararNumeros() {
            var numUm = Number(document.getElementById("numUm").value);
            var numDois = Number(document.getElementById("numDois").value);
            
            if (isNaN(numUm) || isNaN(numDois)){
                alert("digite um numero Válido")
            }


            if (numUm > numDois) {
                alert("O maior numero é: " + numUm);
            } else if (numUm == numDois) {
                alert("Ambos os numeros são iguais");
            } else {
                alert("O maior numero é: " + numDois);
            }
        }

        function descreverNumero() {
            var resultado = document.getElementById("resultado");
            var numero = Number(document.getElementById("numero").value);
            if (numero > 0 ) {
                resultado.textContent = "O numero: " + numero + " é Positivo!";
            } else if (numero < 0) {
                resultado.textContent = "O numero: " + numero + " é Negativo!";
            } else {
                resultado.textContent = "O numero seu numero é: Zero!";
            }
        }

    </script>
</head>
<body>
    <main>
        <h1>Hora de Codar 2: A Vingança do Coder</h1>
        <section class="cards">
            <h3>Escreva um programa em que o usuário informe dois números. Então escreva em tela o maior deles.</h3>
            <label for="numUm">Primeiro número:</label>
            <input type="number" id="numUm" placeholder="Digite o primeiro número"><br> 
            <label for="numDois">Segundo número:</label>
            <input type="number" id="numDois" placeholder="Digite o segundo número">
            <button onclick="compararNumeros()">Comparar</button>
            <hr>

            <h3> Faça um programa que leia um valor informado pelo usuário e diga se o valor informado é positivo, negativo ou zero.</h3>
            <label for="numero">Digite um numero</label>
            <input type="number" id="numero" placeholder="ex: 9">
            <button onclick="descreverNumero()">Descobrir</button>
            <p id="resultado">O numero digitado é: </p>
            <hr>

            

        </section>
    </main>

    
</body>
</html>
